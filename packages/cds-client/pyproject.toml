[project]
name = "cds-client"
version = "0.1.0"
description = "Typed API client for the CosmicDS backend"
requires-python = ">=3.13"
dependencies = [
    "itsdangerous>=2.2.0",
    "pydantic[email]>=2.11.2",
    "requests>=2.32.0",
    "solara>=1.44.1",
    "solara-state",
]

[dependency-groups]
dev = [
    "datamodel-code-generator[http]>=0.25.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
solara-state = { path = "../../../solara-state", editable = true }
