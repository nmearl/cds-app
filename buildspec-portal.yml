version: 0.2

# Builds the CDS Portal Docker image and pushes it to ECR tagged with the
# commit SHA (e.g. commit-abc1234). Downstream deploy buildspecs re-tag
# this image as :staging or :latest so every environment runs the exact
# same artifact that was built here.

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - COMMIT_TAG="commit-$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)"
      - ECR_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME

  build:
    commands:
      - echo Building image $ECR_URI:$COMMIT_TAG
      - docker build -f Dockerfile.portal -t $ECR_URI:$COMMIT_TAG .

  post_build:
    commands:
      - echo Pushing image...
      - docker push $ECR_URI:$COMMIT_TAG
      # Write the tag to a file so the deploy buildspec can read it
      - echo $COMMIT_TAG > commit_tag.txt
      - printf '[{"name":"cds-portal","imageUri":"%s:%s"}]' "$ECR_URI" "$COMMIT_TAG" > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - commit_tag.txt
